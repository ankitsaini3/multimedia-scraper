repos:
  # ─────────────────────────────────────────────────────────────
  # Core formatting & linting (Ruff replaces Black/isort/flake8)
  # ─────────────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0  # Use latest stable; update monthly
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # ─────────────────────────────────────────────────────────────
  # Type checking
  # ─────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0  # Match mypy version in pyproject.toml
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.7.0
          - pydantic-settings>=2.2.1
          - types-requests  # Add other types-* packages as needed
        types_or: [python, pyi]

  # ─────────────────────────────────────────────────────────────
  # Basic repo hygiene (optional but recommended)
  # ─────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: end-of-file-fixer
        types_or: [python, toml, yaml, markdown]
      - id: trailing-whitespace
        types_or: [python, toml, yaml, markdown]

  # ─────────────────────────────────────────────────────────────
  # Project-specific checks (run after formatting/linting)
  # ─────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: pytest
        name: pytest (fast mode)
        entry: uv run pytest
        language: system
        pass_filenames: true  # Run only tests for changed files
        types: [python]
        stages: [pre-commit]  # Skip on push for speed

      - id: import-linter
        name: import-linter
        entry: uv run lint-imports
        language: system
        pass_filenames: false
        stages: [pre-push]  # Architecture checks are slower; run on push

      - id: deptry
        name: deptry (dependency audit)
        entry: uv run deptry .
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: vulture
        name: vulture (dead code detection)
        entry: uv run vulture src --min-confidence 80
        language: system
        pass_filenames: false
        stages: [pre-push]
        types: [python]
